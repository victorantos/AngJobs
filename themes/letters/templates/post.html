<article class="essay">
  <header class="essay-header">
    <h1 class="essay-title">{{ page.title }}</h1>
    {{#if page.description}}<p class="essay-subtitle">{{ page.description }}</p>
    {{/if}}<p class="essay-meta">
      <time datetime="{{ page.date }}">{{ page.dateFormatted }}</time>{{#if page.tagLinks}}<span class="tags">{{#each page.tagLinks as tag}} <a class="tag" href="{{ tag.url }}">{{ tag.name }}</a>{{/each}}</span>{{/if}}
    </p>
  </header>
  {{#if page.cover}}<img class="cover" src="{{ page.cover }}" alt="" loading="lazy" decoding="async">
  {{/if}}<div class="prose essay-body">
{{{ page.content }}}
  </div>
</article>
