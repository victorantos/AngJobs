<article class="post">
  <div class="titleblock">
    <nav class="crumb" aria-label="Breadcrumb">
      <ol>
        <li><a href="/">Home</a></li>
        <li aria-current="page">{{ page.title }}</li>
      </ol>
    </nav>
    {{#if page.date}}<span class="doc-id"><time datetime="{{ page.date }}">{{ page.dateFormatted }}</time></span>{{/if}}
  </div>
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {{#if page.tagLinks}}<p class="meta">{{#each page.tagLinks as tag}}<a class="tag" href="{{ tag.url }}">{{ tag.name }}</a>{{/each}}</p>{{/if}}
  </header>
  <div class="prose">
{{{ page.content }}}
  </div>
</article>
