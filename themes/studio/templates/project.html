<article class="project">
  {{#if page.cover}}<figure class="project-cover">
    <img src="{{ page.cover }}" alt="" decoding="async">
  </figure>
  {{/if}}<header class="project-head column">
    <h1>{{ page.title }}</h1>
    <p class="wall-label">
      {{#if page.client}}<span class="client">{{ page.client }}</span> · {{/if}}<time datetime="{{ page.date }}">{{ page.dateFormatted }}</time>{{#if page.services}} · <span class="services">{{#each page.services as service}}<span class="service">{{ service }}</span>{{/each}}</span>{{/if}}
    </p>
    {{#if page.description}}<p class="lede">{{ page.description }}</p>
    {{/if}}
  </header>
  <div class="prose project-story column">
{{{ page.content }}}
  </div>
  <nav class="project-return column" aria-label="Back to all work">
    <a href="/work/">← All work</a>
  </nav>
</article>
