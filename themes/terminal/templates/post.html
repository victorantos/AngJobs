<article class="post">
  <header class="page-header post-header">
    <p class="meta">
      <time datetime="{{ page.date }}">{{ page.dateFormatted }}</time>{{#if page.readingTime}}<span class="meta-sep" aria-hidden="true">·</span><span>{{ page.readingTime }}</span>{{/if}}
    </p>
    <h1>{{ page.title }}</h1>
    {{#if page.tagLinks}}<p class="tags">{{#each page.tagLinks as tag}}<a class="tag" href="{{ tag.url }}">{{ tag.name }}</a>{{/each}}</p>
    {{/if}}
  </header>
  {{#if page.cover}}<img class="cover" src="{{ page.cover }}" alt="" loading="lazy" decoding="async">
  {{/if}}<div class="prose">
{{{ page.content }}}
  </div>
</article>
