<article class="story static-page">
  {{#if page.hideHeader}}{{else}}<header class="story-head">
    <h1>{{ page.title }}</h1>
    {{#if page.description}}<p class="standfirst">{{ page.description }}</p>
    {{/if}}
  </header>
  {{/if}}
  <div class="prose story-body">
{{{ page.content }}}
  </div>
</article>
{{#if page.promos}}{{> promos}}
{{/if}}
