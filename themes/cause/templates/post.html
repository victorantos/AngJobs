<article class="post">
  <header class="page-header">
    <time class="post-date" datetime="{{ page.date }}">{{ page.dateFormatted }}</time>
    <h1>{{ page.title }}</h1>
    {{#if page.description}}<p class="lede">{{ page.description }}</p>
    {{/if}}{{#if page.tagLinks}}<p class="tags">{{#each page.tagLinks as tag}}<a class="tag" href="{{ tag.url }}">{{ tag.name }}</a>{{/each}}</p>
    {{/if}}
  </header>
  {{#if page.cover}}<img class="cover" src="{{ page.cover }}" alt="" loading="lazy" decoding="async">
  {{/if}}<div class="prose">
{{{ page.content }}}
  </div>
</article>
