<section class="list">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
  </header>
  {{#if items}}
  <ol class="post-list" reversed>
    {{#each items as item}}{{> post-card}}
    {{/each}}
  </ol>
  {{else}}
  <p class="empty">Nothing here yet.</p>
  {{/if}}
  {{#if pagination.multiple}}
  <nav class="pagination" aria-label="Pages">
    {{#if pagination.newer}}<a href="{{ pagination.newer }}">← Newer</a>{{/if}}
    <span>Page {{ pagination.page }} of {{ pagination.totalPages }}</span>
    {{#if pagination.older}}<a href="{{ pagination.older }}">Older →</a>{{/if}}
  </nav>
  {{/if}}
</section>
